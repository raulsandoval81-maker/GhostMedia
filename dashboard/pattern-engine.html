<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pattern Engine</title>

<link rel="stylesheet" href="../assets/css/site.css">
</head>

<body>

<div class="wrap">

  <h1>🧠 Pattern Engine</h1>

  <p>
    Analyze winners and identify repeating patterns.
  </p>

  <div class="stats">

    <div class="card">
      <h2 id="patternCount">0</h2>
      <p>Patterns</p>
    </div>

    <div class="card">
      <h2 id="winnerCount">0</h2>
      <p>Winners</p>
    </div>

  </div>

  <section class="card">

    <h2>Best Pattern</h2>

    <p id="bestPattern">
      No pattern detected.
    </p>

  </section>

  <section class="card">

    <h2>Pattern List</h2>

    <div id="patternList">
      No patterns found.
    </div>

  </section>

  <a href="index.html">
    ← Dashboard
  </a>

</div>

<script src="../assets/js/pattern-engine.js"></script>

<script>

const patterns = rebuildPatternEngine();
const bestPattern = getBestPattern();

document.getElementById("patternCount").textContent =
  patterns.length;

document.getElementById("winnerCount").textContent =
  patterns.length;

document.getElementById("bestPattern").textContent =
  bestPattern
    ? `${bestPattern.label} (${bestPattern.count}x)`
    : "No pattern detected.";

const list =
  document.getElementById("patternList");

if (patterns.length) {

  list.innerHTML =
    patterns.map(p => `
      <div class="card">
        <strong>${p.title || "Winner"}</strong>

        <p>
          Topic:
          ${p.topic || "Unknown"}
        </p>

        <p>
          Format:
          ${p.format || "Unknown"}
        </p>

        <p>
          Platform:
          ${p.platform || "Unknown"}
        </p>
      </div>
    `).join("");

}

</script>

</body>
</html>
