<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Content Generator</title>

  <link rel="stylesheet" href="/assets/css/site.css" />
</head>

<body>

  <div class="wrap">

    <h1>📝 Content Generator</h1>

    <div id="ghostCounts"></div>

    <nav id="ghostNav"></nav>

    <div class="card form-card">

      <label for="ideaSelect">
        Select Idea
      </label>

      <select id="ideaSelect"></select>

      <button id="generateContentBtn">
        Generate Content
      </button>

      <button id="queueContentBtn">
        Add To Queue
      </button>

    </div>

    <section class="content-builder-grid">

      <div class="card content-builder-card">

        <h2>Strategy</h2>

        <pre id="hookOutput" class="content-output">Select an idea and generate content.</pre>

      </div>

      <div class="card content-builder-card">

        <h2>Caption</h2>

        <pre id="captionOutput" class="content-output">Waiting...</pre>

      </div>

      <div class="card content-builder-card">

        <h2>Hashtags</h2>

        <pre id="hashtagsOutput" class="content-output">Waiting...</pre>

      </div>

    </section>

  </div>

  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/ghost-nav.js"></script>
  <script src="/assets/js/ghost-counts.js"></script>
  <script src="/assets/js/content.js"></script>

</body>
</html>
