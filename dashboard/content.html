<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Generator</title>

<link rel="stylesheet" href="/assets/css/site.css">
</head>

<body>

<div class="wrap">

  <h1>📝 Content Generator</h1>
  <div id="ghostCounts"></div>

<nav id="ghostNav" class="nav"></nav>

  <div class="card form-card">

    <label>Select Idea</label>

    <select id="ideaSelect"></select>

    <button id="generateContentBtn">
      Generate Content
    </button>

    <button id="queueContentBtn">
  Add To Queue
    </button>
    

  </div>

  <div class="card">

    <h2>Hook</h2>

    <p id="hookOutput">
      Select an idea and generate content.
    </p>

  </div>

  <div class="card">

    <h2>Caption</h2>

    <p id="captionOutput">
      Waiting...
    </p>

  </div>

  <div class="card">

    <h2>Hashtags</h2>

    <p id="hashtagsOutput">
      Waiting...
    </p>

  </div>

</div>

<script src="/assets/js/storage.js"></script>
<script src="/assets/js/ghost-nav.js"></script>
<script src="/assets/js/ghost-counts.js"></script>
<script src="/assets/js/content.js"></script>
</body>
</html>
