<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Ideas</title>
<link rel="stylesheet" href="/assets/css/site.css">
</head>

<body>

<div class="wrap">

  <h1>💡 Ideas Vault</h1>
  <div id="ghostCounts"></div>

<nav id="ghostNav"></nav>

<div class="card">
  <h2>🕵️ Scout Signals</h2>
  <div id="scoutSignals"></div>
</div>

  <div class="card form-card">
    <input id="ideaTitle" placeholder="Idea title">
    
    <select id="ideaPage">
      <option>Wrestling Highlights</option>
      <option>Wrestling History</option>
      <option>MMA Moments</option>
      <option>MMA Drama</option>
      <option>Gym Humor</option>
      <option>Strength Motivation</option>
      <option>Youth Sports Parents</option>
      <option>Combat Sports News</option>
      <option>Wrestling Technique</option>
      <option>Underdog Stories</option>
    </select>

    <textarea id="ideaNotes" placeholder="Notes, hook, angle, clip idea..."></textarea>

    <button id="saveIdeaBtn">Save Idea</button>
  </div>

  <div id="ideasList" class="pages"></div>

</div>

<script src="/assets/js/storage.js"></script>
<script src="/assets/js/ghost-nav.js"></script>
<script src="/assets/js/ghost-counts.js"></script>
<script src="/assets/js/ideas.js"></script>
</body>
</html>
